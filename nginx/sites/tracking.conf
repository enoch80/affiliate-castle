server {
  listen 80;
  server_name t.yourdomain.com;
  return 301 https://$host$request_uri;
}
server {
  listen 443 ssl http2;
  server_name t.yourdomain.com;
  ssl_certificate /etc/letsencrypt/live/t.yourdomain.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/t.yourdomain.com/privkey.pem;

  # Bridge pages (static HTML - served directly)
  location /go/ {
    root /opt/affiliate-castle/public;
    try_files $uri $uri.html $uri/index.html @app;
    add_header Cache-Control "public, max-age=3600";
  }

  # Tracking redirects and postbacks go to app
  location /r/ { proxy_pass http://127.0.0.1:3200; proxy_set_header X-Real-IP $remote_addr; }
  location /postback { proxy_pass http://127.0.0.1:3200; }
  location /api/ { proxy_pass http://127.0.0.1:3200; }

  @app { proxy_pass http://127.0.0.1:3200; }
}
