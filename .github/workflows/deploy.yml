name: Deploy to Contabo

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CONTABO_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H 109.199.106.147 >> ~/.ssh/known_hosts

      - name: Bootstrap repo on server (first deploy only)
        run: |
          ssh root@109.199.106.147 '
            if [ ! -d /opt/affiliate-castle/.git ]; then
              git clone https://github.com/enoch80/affiliate-castle.git /opt/affiliate-castle
            fi
            # Ensure .env exists
            if [ ! -f /opt/affiliate-castle/.env ]; then
              cp /opt/affiliate-castle/.env.example /opt/affiliate-castle/.env
            fi
          '

      - name: Deploy
        run: |
          ssh root@109.199.106.147 << 'ENDSSH'
            set -e
            cd /opt/affiliate-castle
            git reset --hard HEAD
            git clean -fd
            git pull origin main
            docker compose build app worker
            # Run Prisma migrations before starting app (pinned to v5 — v7 broke schema.prisma url syntax)
            # Use psql directly — more reliable than running prisma CLI in stripped runner image
            docker compose exec -T postgres psql -U affiliate -d affiliatecastle \
              -v ON_ERROR_STOP=0 \
              < /opt/affiliate-castle/prisma/migrations/20260423000000_init/migration.sql \
              && echo "Migration applied" || echo "Migration already applied or skipped"
            docker compose up -d
            docker image prune -f
            echo "Deploy complete at $(date)"
          ENDSSH

      - name: Health check
        run: |
          sleep 15
          ssh root@109.199.106.147 "curl -sf http://127.0.0.1:3200/api/health && echo 'Health OK'"

      - name: Fix nginx SSL for app.digitalfinds.net
        run: |
          # Detect the certbot ssl cert directory on the server
          CERT_DIR=$(ssh root@109.199.106.147 "find /etc/letsencrypt/live -name 'fullchain.pem' 2>/dev/null | head -1 | xargs dirname 2>/dev/null || echo '/etc/letsencrypt/live/digitalfinds.net'")
          echo "SSL cert dir: $CERT_DIR"
          # Write a high-priority nginx server block that ensures app.digitalfinds.net:443 → port 3200
          # Uses printf to avoid YAML heredoc issues; \$var escapes nginx variables from local expansion
          ssh root@109.199.106.147 "printf 'server {\n  listen 443 ssl;\n  http2 on;\n  server_name app.digitalfinds.net;\n  ssl_certificate ${CERT_DIR}/fullchain.pem;\n  ssl_certificate_key ${CERT_DIR}/privkey.pem;\n  add_header X-Frame-Options SAMEORIGIN;\n  add_header X-Content-Type-Options nosniff;\n  add_header Strict-Transport-Security \"max-age=63072000\" always;\n  location / {\n    proxy_pass http://127.0.0.1:3200;\n    proxy_http_version 1.1;\n    proxy_set_header Upgrade \$http_upgrade;\n    proxy_set_header Connection upgrade;\n    proxy_set_header Host \$host;\n    proxy_set_header X-Real-IP \$remote_addr;\n    proxy_set_header X-Forwarded-Proto https;\n    proxy_read_timeout 60s;\n  }\n}\n' > /etc/nginx/conf.d/91-affiliate-castle-ssl.conf && nginx -t && nginx -s reload && echo 'Nginx SSL override applied'"
          sleep 2
          curl -sf https://app.digitalfinds.net/api/health && echo 'Public URL OK' || echo 'WARN: public URL still 502'
