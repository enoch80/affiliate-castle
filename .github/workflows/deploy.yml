name: Deploy to Contabo

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CONTABO_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H 109.199.106.147 >> ~/.ssh/known_hosts

      - name: Bootstrap repo on server (first deploy only)
        run: |
          ssh root@109.199.106.147 '
            if [ ! -d /opt/affiliate-castle/.git ]; then
              git clone https://github.com/enoch80/affiliate-castle.git /opt/affiliate-castle
            fi
            # Ensure .env exists
            if [ ! -f /opt/affiliate-castle/.env ]; then
              cp /opt/affiliate-castle/.env.example /opt/affiliate-castle/.env
            fi
          '

      - name: Deploy
        run: |
          ssh root@109.199.106.147 << 'ENDSSH'
            set -e
            cd /opt/affiliate-castle
            git reset --hard HEAD
            git clean -fd
            git pull origin main
            docker compose build app worker
            # Run Prisma migrations before starting app (pinned to v5 — v7 broke schema.prisma url syntax)
            # Use psql directly — more reliable than running prisma CLI in stripped runner image
            docker compose exec -T postgres psql -U affiliate -d affiliatecastle \
              -v ON_ERROR_STOP=0 \
              < /opt/affiliate-castle/prisma/migrations/20260423000000_init/migration.sql \
              && echo "Migration applied" || echo "Migration already applied or skipped"
            docker compose up -d
            docker image prune -f
            echo "Deploy complete at $(date)"
          ENDSSH

      - name: Health check
        run: |
          sleep 15
          ssh root@109.199.106.147 "curl -sf http://127.0.0.1:3200/api/health && echo 'Health OK'"
          # Fix: ensure the app.digitalfinds.net SSL vhost proxies to 3200
          # (sites-enabled/default has a 443 block proxying to 3333 which catches SSL first)
          ssh root@109.199.106.147 << 'FIXSSH'
            set -e
            # Find the SSL cert path currently used for app.digitalfinds.net
            CERT_DIR=$(nginx -T 2>/dev/null | grep -A5 "app.digitalfinds.net" | grep "ssl_certificate " | head -1 | awk '{print $2}' | tr -d ';' | sed 's|/fullchain.pem||')
            if [ -z "$CERT_DIR" ]; then
              # Fall back: find any cert that likely covers app.digitalfinds.net
              CERT_DIR=$(ls /etc/letsencrypt/live/ | grep -i "digitalfinds\|app" | head -1)
              CERT_DIR="/etc/letsencrypt/live/$CERT_DIR"
            fi
            echo "Using SSL cert dir: $CERT_DIR"
            # Write a high-priority conf.d override for app.digitalfinds.net SSL
            cat > /etc/nginx/conf.d/91-affiliate-castle-ssl.conf << EOF
server {
    listen 443 ssl;
    http2 on;
    server_name app.digitalfinds.net;
    ssl_certificate ${CERT_DIR}/fullchain.pem;
    ssl_certificate_key ${CERT_DIR}/privkey.pem;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Strict-Transport-Security "max-age=63072000" always;
    location / {
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade \$http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
EOF
            nginx -t && nginx -s reload && echo "Nginx SSL override applied and reloaded"
          FIXSSH
          sleep 3
          curl -sf https://app.digitalfinds.net/api/health && echo 'Public URL OK' || echo 'WARN: public URL still 502'
