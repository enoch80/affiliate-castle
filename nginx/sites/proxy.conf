server {
  listen 80;
  server_name app.digitalfinds.net;
  return 301 https://$host$request_uri;
}
server {
  listen 443 ssl;
  server_name app.digitalfinds.net;
  ssl_certificate /etc/letsencrypt/live/app.digitalfinds.net/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/app.digitalfinds.net/privkey.pem;
  add_header Strict-Transport-Security "max-age=63072000" always;
  location /public/img/ {
    alias /opt/affiliate-castle/public/img/;
  }
  location / {
    proxy_pass http://affiliate-castle-app-1:3200;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
  }
}
