name: Deploy to Contabo

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CONTABO_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H 109.199.106.147 >> ~/.ssh/known_hosts

      - name: Bootstrap repo on server (first deploy only)
        run: |
          ssh root@109.199.106.147 '
            if [ ! -d /opt/affiliate-castle/.git ]; then
              git clone https://github.com/enoch80/affiliate-castle.git /opt/affiliate-castle
            fi
            # Ensure .env exists
            if [ ! -f /opt/affiliate-castle/.env ]; then
              cp /opt/affiliate-castle/.env.example /opt/affiliate-castle/.env
            fi
          '

      - name: Deploy
        run: |
          ssh root@109.199.106.147 << 'ENDSSH'
            set -e
            cd /opt/affiliate-castle
            git reset --hard HEAD
            git clean -fd
            git pull origin main
            docker compose build app worker
            # Run Prisma migrations before starting app (pinned to v5 — v7 broke schema.prisma url syntax)
            # Use psql directly — more reliable than running prisma CLI in stripped runner image
            docker compose exec -T postgres psql -U affiliate -d affiliatecastle \
              -v ON_ERROR_STOP=0 \
              < /opt/affiliate-castle/prisma/migrations/20260423000000_init/migration.sql \
              && echo "Migration applied" || echo "Migration already applied or skipped"
            docker compose up -d
            docker image prune -f
            echo "Deploy complete at $(date)"
          ENDSSH

      - name: Health check
        run: |
          sleep 15
          ssh root@109.199.106.147 "curl -sf http://127.0.0.1:3200/api/health && echo 'Health OK'"

      - name: Fix nginx SSL for app.digitalfinds.net
        run: |
          # Patch domainhunt_proxy: fix host.docker.internal (doesn't resolve on Linux) → container name
          # Also ensure the affiliate-castle_default network is connected so container name resolves
          ssh root@109.199.106.147 "
            # Connect affiliate-castle_default network to proxy (idempotent)
            docker network connect affiliate-castle_default domainhunt_proxy 2>/dev/null || true
            # Fix upstream: host.docker.internal → affiliate-castle-app-1 (Docker DNS on Linux)
            sed -i 's|proxy_pass http://host.docker.internal:3200;|proxy_pass http://affiliate-castle-app-1:3200;|g' /opt/domain-hunt-release/nginx.conf
            # Verify the patch
            echo 'proxy_pass line:'; grep 'proxy_pass.*3200' /opt/domain-hunt-release/nginx.conf
            # Reload proxy nginx
            docker exec domainhunt_proxy nginx -t 2>&1 && docker exec domainhunt_proxy nginx -s reload && echo 'Proxy reloaded OK' || echo 'Proxy FAILED'
          "
          sleep 5
          # Test HTTPS from INSIDE the proxy to see if nginx upstream is working
          ssh root@109.199.106.147 "
            echo '=== HTTPS inside proxy ===';
            docker exec domainhunt_proxy wget -qO- -T5 --no-check-certificate https://127.0.0.1/api/health 2>/dev/null && echo '' || echo 'WGET_HTTPS_FAILED';
            echo '=== proxy nginx error log (last 5) ===';
            docker exec domainhunt_proxy cat /var/log/nginx/error.log 2>/dev/null | tail -5 || echo 'no error log';
            echo '=== proxy nginx access log (last 3) ===';
            docker exec domainhunt_proxy cat /var/log/nginx/access.log 2>/dev/null | tail -3 || echo 'no access log';
          "
          curl -sf https://app.digitalfinds.net/api/health && echo 'Public URL OK' || echo 'WARN: public URL still 502 after nginx fix'
