name: Deploy to Contabo

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CONTABO_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H 109.199.106.147 >> ~/.ssh/known_hosts

      - name: Bootstrap repo on server (first deploy only)
        run: |
          ssh root@109.199.106.147 '
            if [ ! -d /opt/affiliate-castle/.git ]; then
              git clone https://github.com/enoch80/affiliate-castle.git /opt/affiliate-castle
            fi
            # Ensure .env exists
            if [ ! -f /opt/affiliate-castle/.env ]; then
              cp /opt/affiliate-castle/.env.example /opt/affiliate-castle/.env
            fi
          '

      - name: Deploy
        run: |
          ssh root@109.199.106.147 << 'ENDSSH'
            set -e
            cd /opt/affiliate-castle
            git reset --hard HEAD
            git clean -fd
            git pull origin main
            docker compose build app worker
            # Run Prisma migrations before starting app (pinned to v5 — v7 broke schema.prisma url syntax)
            # Use psql directly — more reliable than running prisma CLI in stripped runner image
            docker compose exec -T postgres psql -U affiliate -d affiliatecastle \
              -v ON_ERROR_STOP=0 \
              < /opt/affiliate-castle/prisma/migrations/20260423000000_init/migration.sql \
              && echo "Migration applied" || echo "Migration already applied or skipped"
            docker compose up -d
            docker image prune -f
            echo "Deploy complete at $(date)"
          ENDSSH

      - name: Health check
        run: |
          sleep 15
          ssh root@109.199.106.147 "curl -sf http://127.0.0.1:3200/api/health && echo 'Health OK'"
          ssh root@109.199.106.147 "systemctl reload nginx 2>/dev/null || nginx -s reload 2>/dev/null || true && echo 'Nginx reloaded'"
          ssh root@109.199.106.147 "docker compose -f /opt/affiliate-castle/docker-compose.yml ps --format 'table {{.Name}}\t{{.Status}}\t{{.Ports}}'"
          ssh root@109.199.106.147 "docker logs affiliate-castle-app-1 --tail 20 2>&1 || true"
          ssh root@109.199.106.147 "ss -tlnp | grep 3200 || echo 'WARN: nothing on 3200'"
          ssh root@109.199.106.147 "nginx -T 2>/dev/null | grep -B2 -A10 'proxy_pass\|digitalfinds\|3200' | head -60 || true"
          curl -sf https://app.digitalfinds.net/api/health && echo 'Public URL OK' || echo 'WARN: public URL still 502'
