name: Deploy to Contabo

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CONTABO_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H 109.199.106.147 >> ~/.ssh/known_hosts

      - name: Bootstrap repo on server (first deploy only)
        run: |
          ssh root@109.199.106.147 '
            if [ ! -d /opt/affiliate-castle/.git ]; then
              git clone https://github.com/enoch80/affiliate-castle.git /opt/affiliate-castle
            fi
            # Ensure .env exists
            if [ ! -f /opt/affiliate-castle/.env ]; then
              cp /opt/affiliate-castle/.env.example /opt/affiliate-castle/.env
            fi
          '

      - name: Deploy
        run: |
          ssh root@109.199.106.147 << 'ENDSSH'
            set -e
            cd /opt/affiliate-castle
            git reset --hard HEAD
            git clean -fd
            git pull origin main
            docker compose build app worker
            # Run Prisma migrations before starting app (pinned to v5 — v7 broke schema.prisma url syntax)
            # Use psql directly — more reliable than running prisma CLI in stripped runner image
            docker compose exec -T postgres psql -U affiliate -d affiliatecastle \
              -v ON_ERROR_STOP=0 \
              < /opt/affiliate-castle/prisma/migrations/20260423000000_init/migration.sql \
              && echo "Migration applied" || echo "Migration already applied or skipped"
            docker compose up -d
            docker image prune -f
            echo "Deploy complete at $(date)"
          ENDSSH

      - name: Health check
        run: |
          sleep 15
          ssh root@109.199.106.147 "curl -sf http://127.0.0.1:3200/api/health && echo 'Health OK'"

      - name: Fix nginx SSL for app.digitalfinds.net
        run: |
          # SCP the committed nginx config to the server (avoids YAML/heredoc issues)
          scp nginx/sites/app.conf root@109.199.106.147:/etc/nginx/sites-available/affiliate-castle.conf
          # Enable site (idempotent symlink) and capture any nginx -t errors
          ssh root@109.199.106.147 "
            # Clean up any leftover conf.d override from previous deploy attempts
            rm -f /etc/nginx/conf.d/91-affiliate-castle-ssl.conf
            ln -sf /etc/nginx/sites-available/affiliate-castle.conf /etc/nginx/sites-enabled/affiliate-castle.conf
            nginx -t 2>&1 && (pkill -HUP nginx || service nginx reload 2>/dev/null || systemctl restart nginx 2>/dev/null) && echo 'Nginx config applied and reloaded' || (nginx -t 2>&1; echo 'nginx -t FAILED — check config above')
          "
          sleep 5
          # Diagnose: find the Docker container that owns port 443
          ssh root@109.199.106.147 "
            echo '=== container on port 443 ===';
            docker ps --format 'NAME={{.Names}} PORTS={{.Ports}} IMAGE={{.Image}}' | grep ':443->';
            echo '=== all containers with their ports ===';
            docker ps --format '{{.Names}}\t{{.Ports}}' | head -20;
            echo '=== port 3200 check ===';
            curl -sf http://127.0.0.1:3200/api/health -o /dev/null -w '3200_CODE=%{http_code}' && echo '' || echo 'PORT_3200_FAILED';
          "
          curl -sf https://app.digitalfinds.net/api/health && echo 'Public URL OK' || echo 'WARN: public URL still 502 after nginx fix'
