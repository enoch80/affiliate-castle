name: Deploy to Contabo

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CONTABO_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H 109.199.106.147 >> ~/.ssh/known_hosts

      - name: Bootstrap repo on server (first deploy only)
        run: |
          ssh root@109.199.106.147 '
            if [ ! -d /opt/affiliate-castle/.git ]; then
              git clone https://github.com/enoch80/affiliate-castle.git /opt/affiliate-castle
            fi
            # Ensure .env exists
            if [ ! -f /opt/affiliate-castle/.env ]; then
              cp /opt/affiliate-castle/.env.example /opt/affiliate-castle/.env
            fi
          '

      - name: Deploy
        run: |
          ssh root@109.199.106.147 << 'ENDSSH'
            set -e
            cd /opt/affiliate-castle
            git reset --hard HEAD
            git clean -fd
            git pull origin main
            docker compose build app worker
            # Run Prisma migrations before starting app (pinned to v5 — v7 broke schema.prisma url syntax)
            # Use psql directly — more reliable than running prisma CLI in stripped runner image
            docker compose exec -T postgres psql -U affiliate -d affiliatecastle \
              -v ON_ERROR_STOP=0 \
              < /opt/affiliate-castle/prisma/migrations/20260423000000_init/migration.sql \
              && echo "Migration applied" || echo "Migration already applied or skipped"
            docker compose up -d
            docker image prune -f
            echo "Deploy complete at $(date)"
          ENDSSH

      - name: Health check
        run: |
          sleep 15
          ssh root@109.199.106.147 "curl -sf http://127.0.0.1:3200/api/health && echo 'Health OK'"

      - name: Fix nginx SSL for app.digitalfinds.net
        run: |
          # Write nginx vhost config for affiliate-castle (no variable interpolation with single-quoted heredoc)
          cat > /tmp/affiliate-castle-proxy.conf << 'NGINXEOF'
server {
  listen 80;
  server_name app.digitalfinds.net;
  return 301 https://$host$request_uri;
}
server {
  listen 443 ssl;
  server_name app.digitalfinds.net;
  ssl_certificate /etc/letsencrypt/live/app.digitalfinds.net/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/app.digitalfinds.net/privkey.pem;
  add_header Strict-Transport-Security "max-age=63072000" always;
  location /public/img/ {
    alias /opt/affiliate-castle/public/img/;
  }
  location / {
    proxy_pass http://affiliate-castle-app-1:3200;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
  }
}
NGINXEOF
          # SCP the vhost config to the server
          scp /tmp/affiliate-castle-proxy.conf root@109.199.106.147:/tmp/affiliate-castle-proxy.conf
          # Inject vhost into domainhunt_proxy container and reload
          ssh root@109.199.106.147 "
            # Connect affiliate-castle_default network to proxy so it can reach app by container name
            docker network connect affiliate-castle_default domainhunt_proxy 2>/dev/null && echo 'Network connected' || echo 'Network already connected or failed'
            # Ensure conf.d/*.conf is included in nginx.conf
            grep -q 'conf.d/\*' /opt/domain-hunt-release/nginx.conf || sed -i 's|include[[:space:]]\+.*mime.types.*|&\n    include /etc/nginx/conf.d/*.conf;|' /opt/domain-hunt-release/nginx.conf
            # Copy vhost config into the proxy container
            docker cp /tmp/affiliate-castle-proxy.conf domainhunt_proxy:/etc/nginx/conf.d/affiliate-castle.conf
            # Test and reload nginx inside proxy container
            docker exec domainhunt_proxy nginx -t 2>&1 && docker exec domainhunt_proxy nginx -s reload && echo 'Proxy nginx reloaded OK' || (docker exec domainhunt_proxy nginx -t 2>&1; echo 'Proxy nginx FAILED')
          "
          sleep 5
          curl -sf https://app.digitalfinds.net/api/health && echo 'Public URL OK' || echo 'WARN: public URL still 502 after nginx fix'
